jobs:
  check-my-code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install and Run Flake8
        # Мы ставим и СРАЗУ запускаем в одной строке
        run: |
          python -m pip install flake8
          python -m flake8 manager.py --count --select=E9,F63,F7,F82 --show-source --statistics

